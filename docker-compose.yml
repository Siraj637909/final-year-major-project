# Crypto Arbitrage Pro - Docker Compose
# Multi-container deployment configuration

version: '3.8'

services:
  scanner:
    build: .
    container_name: crypto-arbitrage-scanner
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    networks:
      - arbitrage-network
    depends_on:
      - dashboard

  dashboard:
    build: .
    container_name: crypto-arbitrage-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
    networks:
      - arbitrage-network
    command: python dashboard.py

  # Optional: Redis for caching (production)
